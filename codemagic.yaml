workflows:
  test_satin_ios:
    name: iOS Native
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        provisioning_profiles:
          - "adblocker"
          - "extension_adblocker"
          - "extension_trackers"
          - "extension_banners"
          - "extension_secure"
          - "extension_basic"
          - "extension_privacy"
          - "extension_advanced"
        certificates:
          - "Development_surfshield"
    integrations:
      app_store_connect: Surf Adbcloker Team
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - arthurkulik91@gmail.com
        notify:
          success: true
          failure: false
    scripts:
      - name: Debug Codemagic environment
        script: |
          echo "=== Codemagic Environment Debug ==="
          echo "Current directory: $(pwd)"
          echo "Available environment variables:"
          env | grep -E "(CODEMAGIC|APP_STORE|PROVISIONING|CERTIFICATE)" | sort
          echo ""
          echo "=== Keychain status ==="
          security list-keychains
          echo ""
          echo "=== Available certificates ==="
          security find-identity -v -p codesigning
          echo ""
          echo "=== Provisioning profiles directory ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No provisioning profiles directory found"
          echo ""
          echo "=== Codemagic signing files ==="
          ls -la /Users/builder/Library/MobileDevice/ 2>/dev/null || echo "No MobileDevice directory found"
      - name: Check App Store Connect integration
        script: |
          echo "=== App Store Connect Integration Test ==="
          app-store-connect bundle-ids list
          echo ""
          echo "=== Available provisioning profiles ==="
          app-store-connect profiles list
          echo ""
          echo "=== Available certificates ==="
          app-store-connect certificates list
      - name: Manual provisioning profile setup
        script: |
          echo "=== Manual Provisioning Profile Setup ==="
          # Создаем директории
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/MobileDevice/Certificates
          
          # Пытаемся найти и скопировать профили
          echo "Looking for provisioning profiles..."
          find /Users/builder -name "*.mobileprovision" -type f 2>/dev/null | head -10
          find /Users/builder -name "*.p12" -type f 2>/dev/null | head -10
          
          # Копируем найденные файлы
          find /Users/builder -name "*.mobileprovision" -type f -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \; 2>/dev/null || true
          find /Users/builder -name "*.p12" -type f -exec cp {} ~/Library/MobileDevice/Certificates/ \; 2>/dev/null || true
          
          echo "Copied files:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          ls -la ~/Library/MobileDevice/Certificates/
          
          # Пытаемся импортировать сертификаты
          for cert in ~/Library/MobileDevice/Certificates/*.p12; do
            if [ -f "$cert" ]; then
              echo "Importing certificate: $cert"
              security import "$cert" -k build.keychain -P "" -T /usr/bin/codesign -T /usr/bin/security 2>/dev/null || true
            fi
          done
          
          echo "Final keychain status:"
          security find-identity -v -p codesigning build.keychain
      - name: Download specific provisioning profiles
        script: |
          echo "=== Downloading Provisioning Profiles ==="
          # Загружаем профили по их ID из App Store Connect
          app-store-connect fetch-signing-files --profile-id NRA89QWS57  # Adblocker App
          app-store-connect fetch-signing-files --profile-id WPRT6NPF5C  # Adblocker Extensions (trackers)
          app-store-connect fetch-signing-files --profile-id YG27Z46F5M  # extension adblocker
          app-store-connect fetch-signing-files --profile-id YPUBC2XFNP  # extension advanced
          app-store-connect fetch-signing-files --profile-id NHAF4VJ43M  # extension banners
          app-store-connect fetch-signing-files --profile-id 2VSQWC9MXS  # extension basic
          app-store-connect fetch-signing-files --profile-id 2V5T68FMFW  # extension privacy
          app-store-connect fetch-signing-files --profile-id UWYY6K8CQ6  # extension secure
          
          # Загружаем сертификаты
          app-store-connect fetch-signing-files --certificate-id Z4F9LBTZ4Y  # Apple Distribution: Dan Datz
          
          echo "Downloaded files:"
          ls -la *.mobileprovision *.p12 2>/dev/null || echo "No files downloaded"
          
          # Устанавливаем профили
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp *.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || true
          
          # Устанавливаем сертификаты
          mkdir -p ~/Library/MobileDevice/Certificates
          cp *.p12 ~/Library/MobileDevice/Certificates/ 2>/dev/null || true
          
          # Импортируем сертификаты в keychain
          for cert in ~/Library/MobileDevice/Certificates/*.p12; do
            if [ -f "$cert" ]; then
              echo "Importing certificate: $cert"
              security import "$cert" -k build.keychain -P "" -T /usr/bin/codesign -T /usr/bin/security
            fi
          done
          
          echo "Final status:"
          echo "Provisioning profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "Certificates in keychain:"
          security find-identity -v -p codesigning build.keychain
      - name: Create directories
        script: |
          mkdir -p build/ios/ipa
      - name: Build app
        script: |
          xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj -configuration Release -archivePath $CM_BUILD_DIR/build/SurfShield.xcarchive -allowProvisioningUpdates
      - name: Export IPA
        script: xcodebuild -exportArchive -archivePath $CM_BUILD_DIR/build/SurfShield.xcarchive -exportOptionsPlist export_options.plist -exportPath $CM_BUILD_DIR/build/ios/ipa/
      - name: Show IPA files before publishing
        script: ls -la build/ios/ipa/