workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.surfshield.adblocker
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
        - name: Set up keychain to be used for code signing
          script: |
            keychain initialize
            
            # Debug: Check certificates after keychain setup
            echo "=== DEBUG: Certificates after keychain init ==="
            security find-identity -v -p codesigning
        - name: Debug Codemagic setup
          script: |
            # Debug: Check what Codemagic has set up
            echo "=== DEBUG: Codemagic certificates ==="
            security find-identity -v -p codesigning
            
            echo "=== DEBUG: Codemagic profiles ==="
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles directory found"
            
            echo "=== DEBUG: CM_BUILD_DIR contents ==="
            find "$CM_BUILD_DIR" -name "*.mobileprovision" -o -name "*.p12" -o -name "*.cer" 2>/dev/null || echo "No signing files found"
        - name: Configure code signing settings
          script: |
            # Final debug check before build
            echo "=== DEBUG: Final certificate check ==="
            security find-identity -v -p codesigning
            
            echo "=== DEBUG: Final profile check ==="
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles found"
        - name: Build ipa for distribution
          script: |
            xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
             -configuration Release \
             -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
             DEVELOPMENT_TEAM=9JXM4RZUCC \
             CODE_SIGN_STYLE=Automatic \
             -allowProvisioningUpdates
        - name: Create export options plist
          script: |
            cat > "$CM_BUILD_DIR/export_options.plist" << EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store-connect</string>
                <key>teamID</key>
                <string>9JXM4RZUCC</string>
                <key>uploadBitcode</key>
                <false/>
                <key>uploadSymbols</key>
                <true/>
                <key>compileBitcode</key>
                <false/>
                <key>signingStyle</key>
                <string>manual</string>
                <key>stripSwiftSymbols</key>
                <true/>
            </dict>
            </plist>
            EOF
        - name: Export ipa from archive
          script: |
            # Debug: Check profiles before export
            echo "=== DEBUG: Final profile check before export ==="
            echo "Available profiles in system:"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ | wc -l
            echo "Profile files:"
            ls ~/Library/MobileDevice/Provisioning\ Profiles/
            
            echo "=== DEBUG: Checking profile bundle identifiers ==="
            for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*; do
              if [[ -f "$profile" ]]; then
                echo "Profile: $(basename "$profile")"
                BUNDLE_ID=$(security cms -D -i "$profile" 2>/dev/null | grep -A 1 "application-identifier" | grep -o "com\.[^\"]*")
                echo "  Bundle ID: $BUNDLE_ID"
              fi
            done
            
            echo "=== DEBUG: Checking archive contents ==="
            ls -la "$CM_BUILD_DIR/build/SurfShield.xcarchive/Products/Applications/"
            
            echo "=== DEBUG: Export options plist ==="
            cat "$CM_BUILD_DIR/export_options.plist"
            
            echo "=== DEBUG: Starting export ==="
            xcodebuild -exportArchive \
             -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
             -exportPath "$CM_BUILD_DIR/build" \
             -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
               -allowProvisioningUpdates
    artifacts:
      - build/*.ipa
      - build/SurfShield.xcarchive
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SurfShield Beta Testers
