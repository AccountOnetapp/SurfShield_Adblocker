workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.surfshield.adblocker
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
      - name: Set up keychain to be used for code signing
        script: |
          keychain initialize
      - name: Set up Provisioning profiles from environment variables
        script: |
          # Code signing certificate
          CERTIFICATE_PATH="$CM_BUILD_DIR"/certificate.p12
          echo ${CERTIFICATE} | base64 --decode > $CERTIFICATE_PATH
          # Add certificate to keychain
          keychain add-certificates
      - name: Build ipa for distribution
        script: |
          xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
          -configuration Release \
          -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
          -allowProvisioningUpdates \
          DEVELOPMENT_TEAM=9JXM4RZUCC \
          CODE_SIGN_IDENTITY="Apple Development" \
          CODE_SIGN_STYLE=Automatic
    artifacts:
      - build/Release-iphoneos/*.ipa
      - build/Release-iphoneos/*.dSYM.zip
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SurfShield Beta Testers