workflows:
  # Простейший workflow для тестирования
  simple-test:
    name: Simple Test
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: "SurfShield.xcodeproj"
        XCODE_SCHEME: "SurfShield"
        BUNDLE_ID: "com.surfshield.app"
      xcode: latest
    scripts:
      - name: Set up keychain to be used for codesigning
        script: |
          keychain initialize
      - name: Set up signing certificate
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-destination 'generic/platform=iOS'" \
            --export-options-plist export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
