workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        provisioning_profiles:
          - "Distribution_Banners"
          - "Distribution_Adblocker"
          - "Distribution_Adbcloker"
          - "Distribution_Trackers"
          - "Distribution_Secure"
          - "Distribution_Basic"
          - "Distribution_Privacy"
          - "Distribution_Advanced"
        certificates:
          - "SurfShield"
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
        - name: Build ipa for distribution
          script: |
            xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
             -configuration Release \
             -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
             DEVELOPMENT_TEAM=9JXM4RZUCC \
             CODE_SIGN_STYLE=Manual \
             CODE_SIGN_IDENTITY="Apple Distribution" \
             PROVISIONING_PROFILE_SPECIFIER:Banners="Distribution_Banners" \
             PROVISIONING_PROFILE_SPECIFIER:Adblocker="Distribution_Adblocker" \
             PROVISIONING_PROFILE_SPECIFIER:Trackers="Distribution_Trackers" \
             PROVISIONING_PROFILE_SPECIFIER:Secure="Distribution_Secure" \
             PROVISIONING_PROFILE_SPECIFIER:Basic="Distribution_Basic" \
             PROVISIONING_PROFILE_SPECIFIER:Privacy="Distribution_Privacy" \
             PROVISIONING_PROFILE_SPECIFIER:Advanced="Distribution_Advanced" \
    artifacts:
      - build/Release-iphoneos/*.ipa
      - build/Release-iphoneos/*.dSYM.zip
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SurfShield Beta Testers
