workflows:
  test_satin_ios:
    name: iOS Native
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.surfshield.adblocker
    integrations:
      app_store_connect: Surf Adbcloker Team
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      ios_signing:
        provisioning_profiles:
          - "extension_adblocker"
          - "extension_trackers"
          - "extension_banners"
          - "extension_secure"
          - "extension_basic"
          - "extension_privacy"
          - "extension_advanced"
        certificates:
          - "Development_surfshield"
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - arthurkulik91@gmail.com
        notify:
          success: true
          failure: false
    scripts:
      - name: Create directories
        script: |
          mkdir -p build/ios/ipa
      - name: Build app
        script: |
          xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj -configuration Release -archivePath $CM_BUILD_DIR/build/SurfShield.xcarchive -allowProvisioningUpdates
      - name: Export IPA
        script: xcodebuild -exportArchive -archivePath $CM_BUILD_DIR/build/SurfShield.xcarchive -exportOptionsPlist export_options.plist -exportPath $CM_BUILD_DIR/build/ios/ipa/
      - name: Show IPA files before publishing
        script: ls -la build/ios/ipa/