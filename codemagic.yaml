workflows:
  # Простейший workflow для тестирования
  simple-test:
    name: Simple Test
    max_build_duration: 30
    environment:
      vars:
        XCODE_WORKSPACE: "SurfShield.xcodeproj"
        XCODE_SCHEME: "SurfShield"
        BUNDLE_ID: "com.surfshield.app"
        # Только Issuer ID
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(APP_STORE_CONNECT_ISSUER_ID)
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          pod install
      - name: Build app (without signing)
        script: |
          xcode-project build \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --destination "platform=iOS Simulator,name=iPhone 15,OS=latest"
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
