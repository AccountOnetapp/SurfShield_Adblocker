workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        provisioning_profiles:
          - "Distribution_Banners"
          - "Distribution_Adblocker"
          - "Distribution_Adbcloker"
          - "Distribution_Trackers"
          - "Distribution_Secure"
          - "Distribution_Basic"
          - "Distribution_Privacy"
          - "Distribution_Advanced"
        certificates:
          - "Distribution_surfshield"
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
        - name: Set up keychain to be used for code signing
          script: |
            keychain initialize
        - name: Configure code signing settings
          script: |
            # Install xcode-project tool if not available
            if ! command -v xcode-project &> /dev/null; then
              echo "Installing xcode-project tool..."
              pip install xcode-project
            fi
            
            # List available certificates for debugging
            echo "Available certificates:"
            security find-identity -v -p codesigning
            
            # List available provisioning profiles for debugging
            echo "Available provisioning profiles:"
            find ~/Library/MobileDevice/Provisioning\ Profiles/ -name "*.mobileprovision" -exec security cms -D -i {} \; | grep -A 5 -B 5 "com.apple.security.application-groups" || echo "No App Groups found in profiles"
            
            # Use xcode-project to automatically configure provisioning profiles
            xcode-project use-profiles \
              --project SurfShield.xcodeproj \
              --archive-method app-store-connect \
              --code-signing-setup-verbose-logging
        - name: Build ipa for distribution
          script: |
            xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
             -configuration Release \
             -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
             DEVELOPMENT_TEAM=9JXM4RZUCC \
             CODE_SIGN_STYLE=Automatic
        - name: Create export options plist
          script: |
            cat > "$CM_BUILD_DIR/export_options.plist" << EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store</string>
                <key>teamID</key>
                <string>9JXM4RZUCC</string>
                <key>uploadBitcode</key>
                <false/>
                <key>uploadSymbols</key>
                <true/>
                <key>compileBitcode</key>
                <false/>
            </dict>
            </plist>
            EOF
        - name: Export ipa from archive
          script: |
            xcodebuild -exportArchive \
             -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
             -exportPath "$CM_BUILD_DIR/build" \
             -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist"
    artifacts:
      - build/*.ipa
      - build/SurfShield.xcarchive
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SurfShield Beta Testers
