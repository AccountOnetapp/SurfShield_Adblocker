workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        provisioning_profiles:
          - "Distribution_Banners"
          - "Distribution_Adblocker"
          - "Distribution_Adbcloker"
          - "Distribution_Trackers"
          - "Distribution_Secure"
          - "Distribution_Basic"
          - "Distribution_Privacy"
          - "Distribution_Advanced"
        certificates:
          - "Distribution_Sertificate"
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
      - name: Set up keychain to be used for code signing
        script: |
          keychain initialize
          keychain add-certificates
      - name: Install provisioning profiles
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          find "$CM_BUILD_DIR" -name "*.mobileprovision" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
          find "$CM_BUILD_DIR" -name "*.provisionprofile" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
          
          # Проверяем установленные профили
          echo "Installed provisioning profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Configure code signing
        script: |
          xcode-project use-profiles --project SurfShield.xcodeproj --archive-method app-store
      - name: Increment build version
        script: |
          # Создаем уникальную версию сборки на основе timestamp
          BUILD_NUMBER=$(date +%Y%m%d%H%M%S)
          echo "New build version: $BUILD_NUMBER"
          
          # Используем agvtool для установки версии сборки
          agvtool new-version -all $BUILD_NUMBER
          
          # Проверяем, что версия установлена
          echo "Current version after update:"
          agvtool what-version
          
          # Экспортируем новую версию для использования в сборке
          echo "CURRENT_PROJECT_VERSION=$BUILD_NUMBER" >> $CM_ENV
      - name: Build ipa for distribution
        script: |
          echo "Starting archive build..."
          echo "Using build version: $CURRENT_PROJECT_VERSION"
          xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
            DEVELOPMENT_TEAM=9JXM4RZUCC \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates
      - name: Create export options plist
        script: |
          cat > "$CM_BUILD_DIR/export_options.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>9JXM4RZUCC</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.surfshield.adblocker</key>
                <string>Distribution_Adblocker</string>
                <key>com.surfshield.adblocker.extension.banners</key>
                <string>Distribution_Banners</string>
                <key>com.surfshield.adblocker.extension.adblocker</key>
                <string>Distribution_Adblocker</string>
                <key>com.surfshield.adblocker.extension.trackers</key>
                <string>Distribution_Trackers</string>
                <key>com.surfshield.adblocker.extension.secure</key>
                <string>Distribution_Secure</string>
                <key>com.surfshield.adblocker.extension.basic</key>
                <string>Distribution_Basic</string>
                <key>com.surfshield.adblocker.extension.privacy</key>
                <string>Distribution_Privacy</string>
                <key>com.surfshield.adblocker.extension.advanced</key>
                <string>Distribution_Advanced</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Export ipa from archive
        script: |
          echo "Starting IPA export..."
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build" \
            -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
            -allowProvisioningUpdates
    artifacts:
      - build/*.ipa
      - build/SurfShield.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - arthurkulik99@gmail.com
        notify:
          success: true
          failure: false