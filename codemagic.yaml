    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'feature/*'
          include: true
          source: true
    scripts:
      - name: Initialize keychain to be used for codesigning using Codemagic CLI 'keychain' command
        script: |
          keychain initialize
      - name: set up provisioning profiles
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/$(uuidgen).mobileprovision)"
          echo ${CM_PROVISIONING_PROFILE} | base64 --decode > "$PROFILE_PATH"
          echo "Saved provisioning profile $PROFILE_PATH"
      - name: Add signing certificate to keychain
        script: |
          # Check if CM_CERTIFICATE is available
          if [ -z "$CM_CERTIFICATE" ]; then
            echo "CM_CERTIFICATE is not set, trying to use manual code signing..."
            # Try to use the certificate from manual code signing
            if [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
              echo "Using CERTIFICATE_PRIVATE_KEY for code signing"
              # Convert private key to p12 format if needed
              echo "$CERTIFICATE_PRIVATE_KEY" > /tmp/certificate.pem
              # For now, we'll skip certificate addition and rely on automatic signing
              echo "Skipping manual certificate addition, using automatic signing"
            else
              echo "No certificate available, using automatic code signing"
            fi
          else
            echo "Using CM_CERTIFICATE for code signing"
            echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
            if [ -f /tmp/certificate.p12 ]; then
              keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
            else
              echo "Failed to decode certificate, using automatic signing"
            fi
          fi
      - name: Increment build number
        script: |
          # increment build number
          #!/bin/sh
          set -e
          set -x
          cd $FCI_BUILD_DIR
          # agvtool new-version -all $(($BUILD_NUMBER +1))
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1))
      - name: Set up code signing settings on Xcode project
        script: |
          # Try to use profiles if available, otherwise use automatic signing
          if [ -n "$CM_PROVISIONING_PROFILE" ]; then
            echo "Using manual provisioning profiles"
            xcode-project use-profiles
          else
            echo "Using automatic code signing"
            # Set up automatic code signing
            xcode-project use-profiles --type automatic
          fi
      - name: Build .ipa
        script: |
          # Create output directory
          mkdir -p build/ios/ipa
          
          # Try different build methods
          echo "Attempting to build IPA..."
          
          # Method 1: Try Codemagic CLI with manual signing
          if [ -n "$CM_PROVISIONING_PROFILE" ] && [ -n "$CM_CERTIFICATE" ]; then
            echo "Building with manual code signing using Codemagic CLI"
            if xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"; then
              echo "Build successful with manual signing"
              exit 0
            else
              echo "Manual signing failed, trying automatic signing"
            fi
          fi
          
          # Method 2: Try Codemagic CLI with automatic signing
          echo "Building with automatic code signing using Codemagic CLI"
          if xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME" --code-signing automatic; then
            echo "Build successful with automatic signing"
            exit 0
          else
            echo "Codemagic CLI failed, trying xcodebuild"
          fi
          
          # Method 3: Fallback to xcodebuild
          echo "Building with xcodebuild as fallback"
          xcodebuild archive \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/SurfShield.xcarchive \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration
          
          xcodebuild -exportArchive \
            -archivePath build/SurfShield.xcarchive \
            -exportOptionsPlist export_options.plist \
            -exportPath build/ios/ipa/
          
          echo "Build completed successfully"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - arthurkulik91@gmail.com
        notify:
          success: true
          failure: true              
      app_store_connect:   # https://docs.codemagic.io/publishing-yaml/distribution              
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY         # Contents of the API key, can also reference environment variable such as $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER       # Alphanumeric value that identifies the API key, can also reference environment variable such as $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID         # Alphanumeric value that identifies who created the API key, can also reference environment variable such as $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true                     # Optional boolean, defaults to false. Whether or not to submit the uploaded build to TestFlight beta review. Required for distributing to beta groups. Note: This action is performed during post-processing.
        submit_to_app_store: false                     # Whether to submit to App Store for review
        # beta_groups:                                  # Specify the names of beta tester groups that will get access to the build once it has passed beta review. 
        #       - group name 1
        #       - group name 2