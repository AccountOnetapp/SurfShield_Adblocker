workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.surfshield.adblocker
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
      - name: Set up keychain to be used for code signing
        script: |
          keychain initialize
      - name: Set up Provisioning profiles from environment variables
        script: |
          # App Store provisioning profile
          PROVISIONING_PROFILE_PATH="$CM_BUILD_DIR"/profile_adhoc.mobileprovision
          echo ${PROVISIONING_PROFILE} | base64 --decode > $PROVISIONING_PROFILE_PATH
          PROVISIONING_PROFILE_UUID="$CM_BUILD_DIR"/uuid.txt
          echo ${PROVISIONING_PROFILE_UUID} > $PROVISIONING_PROFILE_UUID
          # Code signing certificate
          CERTIFICATE_PATH="$CM_BUILD_DIR"/certificate.p12
          echo ${CERTIFICATE} | base64 --decode > $CERTIFICATE_PATH
          # Add certificate to keychain
          keychain add-certificates
      - name: Build ipa for distribution
        script: |
          # Set up code signing settings
          xcode-project use-profiles
          
          # Show build settings for debugging
          echo "=== Build Settings ==="
          xcodebuild -project "$CM_BUILD_DIR/SurfShield.xcodeproj" -scheme "SurfShield" -showBuildSettings | head -20
          
          # List available schemes
          echo "=== Available Schemes ==="
          xcodebuild -project "$CM_BUILD_DIR/SurfShield.xcodeproj" -list
          
          # Try to build with verbose output
          echo "=== Building with verbose output ==="
          xcodebuild -project "$CM_BUILD_DIR/SurfShield.xcodeproj" \
            -scheme "SurfShield" \
            -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
            archive \
            -verbose \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=9JXM4RZUCC \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual
          
          # Export IPA if archive succeeded
          if [ -d "$CM_BUILD_DIR/build/SurfShield.xcarchive" ]; then
            echo "=== Exporting IPA ==="
            xcodebuild -exportArchive \
              -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
              -exportPath "$CM_BUILD_DIR/build/" \
              -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist"
          else
            echo "Archive failed, trying alternative build approach..."
            # Alternative: try building without archive first
            xcodebuild -project "$CM_BUILD_DIR/SurfShield.xcodeproj" \
              -scheme "SurfShield" \
              -configuration Release \
              -destination "generic/platform=iOS" \
              build \
              COMPILER_INDEX_STORE_ENABLE=NO \
              DEVELOPMENT_TEAM=9JXM4RZUCC \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              CODE_SIGN_STYLE=Manual
          fi
    artifacts:
      - build/Release-iphoneos/*.ipa
      - build/Release-iphoneos/*.dSYM.zip
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SurfShield Beta Testers