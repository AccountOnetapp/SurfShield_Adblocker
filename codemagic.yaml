workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        # distribution_type: app_store
        # bundle_identifier: com.surfshield.adblocker
        provisioning_profiles:
          - "Distribution_Banners"
          - "Distribution_Adblocker"
          - "Distribution_Trackers"
          - "Distribution_Secure"
          - "Distribution_Basic"
          - "Distribution_Privacy"
          - "Distribution_Advanced"
        certificates:
          - "Distribution_Sertificate"
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
      - name: Set up keychain to be used for code signing
        script: |
          keychain initialize
          keychain add-certificates
      - name: Install provisioning profiles
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          find "$CM_BUILD_DIR" -name "*.mobileprovision" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
          find "$CM_BUILD_DIR" -name "*.provisionprofile" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
      - name: Configure code signing
        script: |
          xcode-project use-profiles --project SurfShield.xcodeproj --archive-method app-store
      - name: Build ipa for distribution
        script: |
          xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
            DEVELOPMENT_TEAM=9JXM4RZUCC \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates
      - name: Create export options plist
        script: |
          cat > "$CM_BUILD_DIR/export_options.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>9JXM4RZUCC</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
             <key>com.surfshield.adblocker</key>
             <string>53138515-026c-45af-a538-d96e1745471c</string>
              <key>com.surfshield.adblocker.extension.banners</key>
              <string>31991c2d-1100-4dd5-a878-245f327cac59</string>
              <key>com.surfshield.adblocker.extension.adblocker</key>
              <string>9625a292-f5a6-4d0e-9df1-3e6ac7b0c671</string>
              <key>com.surfshield.adblocker.extensions.trackers</key>
              <string>f445c46b-ddc1-422b-bae7-d94ac6c61a85</string>
              <key>com.surfshield.adblocker.extension.secure</key>
              <string>2ca22ad0-0075-44c4-b343-54fe7d441955</string>
              <key>com.surfshield.adblocker.extension.basic</key>
              <string>9c38adf3-64fa-4c62-a19f-3d728beae9f9</string>
              <key>com.surfshield.adblocker.extension.privacy</key>
              <string>e4ea00ec-8bc7-4f40-97d0-c5416fb0bacd</string>
              <key>com.surfshield.adblocker.extension.advanced</key>
              <string>7ba446d2-2fb0-4980-a7df-f4e66caf20a5</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
      - name: Export ipa from archive
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build" \
            -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
            -allowProvisioningUpdates
    artifacts:
      - build/*.ipa
      - build/SurfShield.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: false
