workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        provisioning_profiles:
          - "SurfShield App Store Profile"
          - "Adblocker Extension Profile"
          - "Banners Extension Profile"
          - "Trackers Extension Profile"
          - "Secure Extension Profile"
          - "Basic Extension Profile"
          - "Privacy Extension Profile"
          - "Advanced Extension Profile"
        certificates:
          - "Apple Distribution Certificate"
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
      - name: Set up keychain to be used for code signing
        script: |
          keychain initialize
      - name: Build ipa for distribution
        script: |
          xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
          -configuration Release \
          -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
          -allowProvisioningUpdates \
          DEVELOPMENT_TEAM=9JXM4RZUCC \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          CODE_SIGN_STYLE=Manual
    artifacts:
      - build/Release-iphoneos/*.ipa
      - build/Release-iphoneos/*.dSYM.zip
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SurfShield Beta Testers