workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        provisioning_profiles:
          - "Distribution_Banners"
          - "Distribution_Adbcloker"
          - "Distribution_Adblocker"
          - "Distribution_Trackers"
          - "Distribution_Secure"
          - "Distribution_Basic"
          - "Distribution_Privacy"
          - "Distribution_Advanced"
        certificates:
          - "Distribution_surfshield"
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
      - name: Set up keychain to be used for code signing
        script: |
          keychain initialize
      - name: Set up Provisioning profiles
        script: |
          # Install provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Find and install all .mobileprovision files
          find "$CM_BUILD_DIR" -name "*.mobileprovision" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
          
          # List installed profiles for debugging
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build ipa for distribution
        script: |
          xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
          -configuration Release \
          -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
          -allowProvisioningUpdates \
          DEVELOPMENT_TEAM=9JXM4RZUCC \
          CODE_SIGN_IDENTITY="Apple Development" \
          CODE_SIGN_STYLE=Manual
    artifacts:
      - build/Release-iphoneos/*.ipa
      - build/Release-iphoneos/*.dSYM.zip
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SurfShield Beta Testers