workflows:
  ios-surfshield:
    name: iOS SurfShield
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        provisioning_profiles:
          - "Distribution_Banners"
          - "Distribution_Adblocker"
          - "Distribution_Trackers"
          - "Distribution_Secure"
          - "Distribution_Basic"
          - "Distribution_Privacy"
          - "Distribution_Advanced"
        certificates:
          - "Distribution_Sertificate"
    integrations:
      app_store_connect: Surf Adbcloker Team
    scripts:
      - name: Set up keychain to be used for code signing
        script: |
          keychain initialize
          keychain add-certificates
      - name: Install provisioning profiles
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          find "$CM_BUILD_DIR" -name "*.mobileprovision" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
          find "$CM_BUILD_DIR" -name "*.provisionprofile" -exec cp {} ~/Library/MobileDevice/Provisioning\ Profiles/ \;
      - name: Configure code signing
        script: |
          xcode-project use-profiles --project SurfShield.xcodeproj --archive-method app-store
          # Устанавливаем автоматическую подпись для всех таргетов
          xcode-project configure-provisioning-profiles --project SurfShield.xcodeproj --target SurfShield --profile-name "Automatic"
          xcode-project configure-provisioning-profiles --project SurfShield.xcodeproj --target adblocker --profile-name "Automatic"
          xcode-project configure-provisioning-profiles --project SurfShield.xcodeproj --target basic --profile-name "Automatic"
          xcode-project configure-provisioning-profiles --project SurfShield.xcodeproj --target advanced --profile-name "Automatic"
          xcode-project configure-provisioning-profiles --project SurfShield.xcodeproj --target banners --profile-name "Automatic"
          xcode-project configure-provisioning-profiles --project SurfShield.xcodeproj --target privacy --profile-name "Automatic"
          xcode-project configure-provisioning-profiles --project SurfShield.xcodeproj --target secure --profile-name "Automatic"
          xcode-project configure-provisioning-profiles --project SurfShield.xcodeproj --target trackers --profile-name "Automatic"
      - name: Build ipa for distribution
        script: |
          echo "Starting archive build..."
          xcodebuild archive -scheme SurfShield -project SurfShield.xcodeproj \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
            DEVELOPMENT_TEAM=6TVC5Q5R78 \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            -allowProvisioningUpdates \
            -verbose
      - name: Create export options plist
        script: |
          cat > "$CM_BUILD_DIR/export_options.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>6TVC5Q5R78</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
      - name: Export ipa from archive
        script: |
          echo "Starting IPA export..."
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/SurfShield.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build" \
            -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
            -allowProvisioningUpdates \
            -verbose
    artifacts:
      - build/*.ipa
      - build/SurfShield.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - arthurkulik99@gmail.com
        notify:
          success: true
          failure: false